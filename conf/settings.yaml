common:
  model_path: "Qwen/Qwen3-1.7B"             # Base model to use
  dataset: "truthful_qa"                    # Default dataset
  hf_hub_token: ""                          # Hugging Face token
  batch_size: 1                             # Batch size for training or evaluation
  max_length: 1024                          # Maximum sequence length
  load_in_8bit: false                       # Load model in 8-bit quantization
  load_in_4bit: false                       # Load model in 4-bit quantization
  seed: 42                                  # Random seed for reproducibility

  parameter_efficient_mode: "lora+prompt-tuning" # Efficient tuning method

  lora_config:
    r: 16                                   # Higher rank for complex reasoning
    alpha: 32                               # Larger alpha for stronger updates
    dropout: 0.2                            # Lower dropout - truthfulness requires precision
    bias: "lora_only"                       # Keep bias for offset learning
    inference_mode: false
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "down_proj"
    init_lora_weights: true
    fan_in_fan_out: false
    use_rslora: true
    module: "all"                           # LoRA module selection (used only if target_modules is empty)
                                            #   'all': Apply LoRA to both attention and MLP layers (q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj)
                                            #   'atten': Apply only to attention layers (q_proj, k_proj, v_proj, o_proj)
                                            #   'mlp': Apply only to MLP layers (gate_proj, up_proj, down_proj)
                                            #   'q_v': Apply only to query and value projections (q_proj, v_proj)

train:
  learning_rate: 0.00001                    # Learning rate
  num_train_epochs: 1                       # Number of training epochs
  warmup_steps: 100                         # Warmup steps for scheduler
  gradient_accumulation_steps: 4            # Gradient accumulation steps
  logging_steps: 10                         # Log every N steps
  eval_steps: 50                            # Evaluate every N steps
  save_steps: 100                           # Save checkpoint every N steps
  save_total_limit: 1                       # Keep only last N checkpoints
  fp16: true                                # Use mixed precision training

generator:
  backend: "openai"                         # 'openai' | 'vllm'
  mode: "train"                             # Default mode for generation
  max_tokens: 1024                          # Maximum number of tokens to generate in the completion
  temperature: 0.3                          # Temperature for generation (0.0-2.0)
  top_p: 1.0                                # Nucleus sampling parameter
  frequency_penalty: 0.0                    # Frequency penalty
  presence_penalty: 0.0                     # Presence penalty
  stop_sequences: []                        # Stop sequences for generation
  train_split_ratio: 0.8                    # Train split ratio
  incremental_save: false                   # Save results incrementally
  min_memory_steps: 0                       # Minimum number of <memory> steps (factual knowledge retrieval) required in each CoT
  min_reason_steps: 1                       # Minimum number of <reason> steps (logical reasoning) required in each CoT
  max_cot_validation_attempts: 3            # Maximum number of attempts to validate and regenerate CoT steps for each example
  max_generation_attempts: 3                # Maximum number of retries for generating a qualified example with valid CoT steps
  require_memory_before_reason: false       # Whether to require at least one <memory> (factual knowledge) step before any <reason> (reasoning) steps
  token_order_requirements: false           # Whether to retuire earlier token steps must come before later token steps
  require_both_memory_reason: false         # Whether to require both <memory> and <reason> step types in each CoT
  validate_cot_steps: true                  # Whether to validate the quality and structure of generated Chain-of-Thought steps
  batch_size: 16                            # Batch size for generation
  max_retries: 1                            # Maximum number of retry attempts

  llm_api:                                  # OpenAI API configuration (used when backend='openai')
    api_key: ""                             # API key for the LLM service
    api_base: "https://api.openai.com/v1"   # API endpoint URL
    model: "gpt-4o"                         # Model name to use
    timeout: 60                             # Request timeout in seconds
    retry_min_wait: 1                       # Minimum wait between retries (seconds)
    retry_max_wait: 60                      # Maximum wait between retries (seconds)

  vllm:                                     # vLLM configuration (used when backend='vllm')
    model: "Qwen/Qwen3-1.7B"                # Path to local model or HuggingFace model name
    max_model_len: 1024                     # Maximum model context length
    seed: 42                                # Random seed for reproducibility
    tensor_parallel_size: 1                 # Tensor parallelism (number of GPUs)
    gpu_memory_utilization: 0.8             # GPU memory utilization (0.0-1.0)
    use_chat_template: true                 # Whether to use chat template for formatting
    system_message: "You are a helpful assistant." # System message for chat template

logging:
  wandb_project: "mem"                      # Weights & Biases project name
  wandb_entity: null                        # Weights & Biases organization/username
  log_level: "INFO"                         # Logging level: 'DEBUG' | 'INFO' | 'WARNING' | 'ERROR' | 'CRITICAL'

experiment:
  name: "mem"
  notes: "Memory and Reasoning"
  tags: ["lora", "prompt-tuning"]
